name: Subscription Billing Cron

on:
  schedule:
    # Runs every day at 09:00 UTC (12:00 Moscow time)
    - cron: '0 9 * * *'
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  charge:
    name: Charge due subscriptions
    runs-on: ubuntu-latest

    steps:
      - name: Trigger subscription billing
        run: |
          response=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            -X POST "${{ secrets.NEXT_PUBLIC_APP_URL }}/api/cron/subscriptions" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")

          echo "HTTP status: $response"
          cat /tmp/resp.json

          if [ "$response" != "200" ]; then
            echo "Billing cron failed with status $response"
            exit 1
          fi
